name: LiquidEditor
options:
  bundleIdPrefix: com.liquideditor
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  settingPresets:
    - debug
    - release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "YES"
    METAL_COMPILER_FLAGS: ""
    MTL_HEADER_SEARCH_PATHS: "$(SRCROOT)/LiquidEditor/Metal/Shaders"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: TJ9YTH589R

packages:
  swift-collections:
    url: https://github.com/apple/swift-collections.git
    from: "1.1.0"
  swift-algorithms:
    url: https://github.com/apple/swift-algorithms.git
    from: "1.2.0"

schemes:
  LiquidEditor:
    build:
      targets:
        LiquidEditor: all
        LiquidEditorTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LiquidEditorTests
    profile:
      config: Release
    analyze:
      config: Debug

targets:
  LiquidEditor:
    type: application
    platform: iOS
    sources:
      - path: LiquidEditor
        excludes:
          - "**/CLAUDE.md"
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationAllButUpsideDown"
        PRODUCT_BUNDLE_IDENTIFIER: com.liquideditor.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
    dependencies:
      - package: swift-collections
        product: OrderedCollections
      - package: swift-algorithms
        product: Algorithms

  LiquidEditorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LiquidEditorTests
        excludes:
          - "**/CLAUDE.md"
          - "Fixtures/**/*"
      - path: LiquidEditorTests/Fixtures
        buildPhase: resources
        optional: true
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liquideditor.tests
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: LiquidEditor
