<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LiquidEditor — Export (iPhone)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --canvas-base:    #07070A;
  --canvas-raised:  #0F0F12;
  --canvas-elev:    #1A1A1F;
  --text-primary:   #F3EEE6;
  --text-secondary: #9C9A93;
  --text-tertiary:  #5A5852;
  --text-on-accent: #07070A;
  --accent-amber:   #E6B340;
  --accent-glow:    rgba(230,179,64,0.37);
  --stroke-hairline:  rgba(255,255,255,0.06);
  --stroke-prominent: rgba(255,255,255,0.12);
  --r-md: 10px; --r-lg: 16px; --r-xl: 22px; --r-full: 999px;
  --type-title:    600 17px/20px -apple-system, SF Pro Text, ui-sans-serif;
  --type-body:     400 15px/20px -apple-system, SF Pro Text, ui-sans-serif;
  --type-caption:  500 12px/16px -apple-system, SF Pro Text, ui-sans-serif;
  --type-mono:     500 13px/16px ui-monospace, "SF Mono", "Menlo";
  --type-title2:   600 22px/26px -apple-system, SFProDisplay-Semibold, ui-rounded;
  --type-display:  600 64px/68px ui-monospace, "SF Mono", "Menlo";
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #000; color: var(--text-primary); font: var(--type-body); }
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; }
.device { width: 393px; height: 852px; background: var(--canvas-base); border-radius: 56px;
  box-shadow: 0 0 0 10px #0a0a0a, 0 0 0 12px #1a1a1a, 0 30px 80px rgba(0,0,0,0.5);
  overflow: hidden; position: relative; display: flex; flex-direction: column; }
.island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 122px; height: 36px; background: #000; border-radius: 20px; z-index: 50; }

.header {
  padding: 70px 24px 8px; display: flex; justify-content: space-between; align-items: center;
}
.header .back { width: 32px; height: 32px; display: grid; place-items: center; font-size: 20px; }
.header .title { font: var(--type-title2); }
.header .sub { font: var(--type-caption); color: var(--text-secondary); text-align: center; }
.header .settings { width: 32px; height: 32px; display: grid; place-items: center; font-size: 18px; color: var(--text-secondary); }

/* Preview ring */
.ring-wrap { display: grid; place-items: center; padding: 20px 0 8px; position: relative; }
.ring {
  width: 260px; height: 260px; border-radius: 22px; position: relative;
  background: linear-gradient(135deg, #3a2b55 0%, #201632 70%);
  overflow: hidden;
}
/* gradient ring border simulated with mask */
.ring::before {
  content:""; position: absolute; inset: -6px; border-radius: 26px;
  background: conic-gradient(from 90deg, #ff3aa0, #e5534a, #ff9f2d, #e6b340, #ff3aa0);
  z-index: -1;
}
.ring .centered {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
}
.ring .centered .meta { font: var(--type-mono); color: var(--text-primary); }
.ring .centered .sub { font: var(--type-caption); color: var(--text-secondary); margin-top: 2px; }

/* Preset segmented */
.seg {
  margin: 20px 20px 0; height: 36px; border-radius: var(--r-full);
  background: var(--canvas-raised); display: flex; padding: 3px;
  border: 1px solid var(--stroke-hairline);
}
.seg .opt { flex: 1; display: grid; place-items: center; font: var(--type-caption); color: var(--text-secondary); border-radius: var(--r-full); }
.seg .opt.active {
  background: var(--accent-amber); color: var(--text-on-accent); font-weight: 600;
}

/* Rows */
.rows { padding: 8px 20px 0; display: flex; flex-direction: column; gap: 4px; }
.row {
  height: 56px; padding: 0 14px; border-radius: var(--r-md);
  background: var(--canvas-raised);
  border: 1px solid var(--stroke-hairline);
  display: flex; align-items: center; justify-content: space-between;
}
.row .left { display: flex; flex-direction: column; }
.row .label { font: var(--type-body); font-weight: 500; color: var(--text-primary); }
.row .desc { font: var(--type-caption); color: var(--text-secondary); }
.row .value { font: var(--type-mono); color: var(--text-primary); }
.row .toggle {
  width: 44px; height: 26px; border-radius: 13px; background: var(--canvas-elev);
  border: 1px solid var(--stroke-hairline); position: relative;
}
.row .toggle.on { background: var(--accent-amber); border-color: var(--accent-amber); }
.row .toggle .knob { width: 22px; height: 22px; border-radius: 50%; background: var(--text-primary); position: absolute; top: 1px; left: 1px; }
.row .toggle.on .knob { left: auto; right: 1px; background: var(--text-on-accent); }

/* Sticky Export CTA */
.cta-sticky {
  margin-top: auto; padding: 16px 20px 40px;
  background: linear-gradient(180deg, transparent, rgba(7,7,10,0.85) 35%);
}
.cta {
  height: 52px; border-radius: var(--r-full);
  background: var(--accent-amber); color: var(--text-on-accent);
  display: grid; place-items: center; font: var(--type-title); font-weight: 600;
  box-shadow: 0 10px 24px var(--accent-glow);
}
.cta .sub { font: var(--type-caption); font-weight: 500; margin-top: 2px; opacity: 0.8; }
.caption { width: 393px; text-align: center; color: var(--text-secondary); font: var(--type-caption); margin-top: 12px; }
</style>
</head>
<body>
<div>
<div class="device">
  <div class="island"></div>

  <div class="header">
    <div class="back">‹</div>
    <div style="display:flex; flex-direction:column; align-items:center;">
      <div class="title">Export</div>
      <div class="sub">Ready to export</div>
    </div>
    <div class="settings">⚙︎</div>
  </div>

  <div class="ring-wrap">
    <div class="ring">
      <div class="centered">
        <div class="meta">2K</div>
        <div class="meta" style="font-size:11px; opacity:0.75">1080×1920 · 60 fps</div>
      </div>
    </div>
  </div>

  <div class="seg">
    <div class="opt">Quick</div>
    <div class="opt active">Social</div>
    <div class="opt">Pro</div>
    <div class="opt">Custom</div>
  </div>

  <div class="rows">
    <div class="row">
      <div class="left"><div class="label">Resolution</div><div class="desc">Source 4K → 2K</div></div>
      <div class="value">2K</div>
    </div>
    <div class="row">
      <div class="left"><div class="label">Frame rate</div><div class="desc">Matches source</div></div>
      <div class="value">60 fps</div>
    </div>
    <div class="row">
      <div class="left"><div class="label">Quality</div><div class="desc">Recommended for social</div></div>
      <div class="value">High</div>
    </div>
    <div class="row">
      <div class="left"><div class="label">HDR</div><div class="desc">10-bit Rec. 2020</div></div>
      <div class="toggle"><div class="knob"></div></div>
    </div>
    <div class="row">
      <div class="left"><div class="label">Audio-only</div><div class="desc">Export .m4a instead</div></div>
      <div class="toggle"><div class="knob"></div></div>
    </div>
  </div>

  <div class="cta-sticky">
    <div class="cta">
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div>Export · ~38 MB</div>
      </div>
    </div>
  </div>
</div>
<div class="caption">Export — iPhone · approved design per §5.2</div>
</div>
</body>
</html>
